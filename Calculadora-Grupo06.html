<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira</title>
</head>

<body>
    <h1>Calculadora Financeira</h1>
    Quantos litros de leite você produz por dia?
    <input type="text" id="input_litroLeite"><br><br>
    Qual o custo da produção de 1 litro de leite?
    <input type="text" id="input_custoLeite"><br><br>
    Preço do kg do queijo vendido:
    <input type="text" id="input_precoQueijo"><br><br>
    Gastos a mais do mês (R$):
    <input type="text" id="input_gastosExtra_1"><br><br>
    Gasto a mais do mês (%) :
    <input type="text" id="input_gastosExtra_2"><br>
    (Opcional)<br><br>
    <button onclick="simular()">Simular economia</button><br><br>
    <div id="div_mensagem"></div>
</body>

</html>
<script>
    let simulacao = 0;
    function simular() {
        let litrosLeite = Number(input_litroLeite.value);
        let custoLeite = Number(input_custoLeite.value);
        let precoKg = Number(input_precoQueijo.value);
        let gastos1 = Number(input_gastosExtra_1.value);
        let gastos2 = Number(input_gastosExtra_2.value);
        // custo total da produção de leite (R$) 
        let custo_producao_leite = litrosLeite * custoLeite
        // litros de leite para kg de queijo (kg) 
        let total_queijo = litrosLeite / 10 // estimativa de 10L para 1 Kg queijo
        // lucro bruto de queijos (R$) 
        let lucro_bruto = total_queijo * precoKg //precokg = preço da venda 
        // lucro liquido de queijos sem extras (R$) 
        let lucro_liquido = lucro_bruto - custo_producao_leite
        // estatisticas aproximada com e sem sensor (R$) 
        let perda_sem = total_queijo * 0.10
        let perda_com = total_queijo * 0.02
        // em dias de produção das perdas com e sem sensor 
        let dia_sem = perda_sem * 10 / litrosLeite
        simulacao++;

        div_mensagem.innerHTML += `
            <b>Resumo da Simulação ${simulacao}</b><br> 
            Você produz aproximadamente R$ ${total_queijo} kg de quiejo por dia. <br> 
            O custo para produzir o leite em um dia é de R$ ${custo_producao_leite}.<br> 
            Seu lucro estimado com a venda de todos queijos da produção é de R$ 
            ${lucro_liquido_com_extra}<br><br> 
            <b>Seus Riscos:</b><br> 
            <span > Sem monitoramento, perda estimada: R$ ${perda_sem}</span><br> 
            Com monitoramento, perda estimada: R$ ${perda_com}<br> 
            (Sem monitoramento, equivale a aproximadamente ${dia_sem} dias de produção 
            perdido)<br><br>;
            `

    }
